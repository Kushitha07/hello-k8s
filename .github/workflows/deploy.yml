name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group hello-rg \
            --name hello-aks \
            --overwrite-existing

      - name: Delete old job if exists
        run: kubectl delete job hello-world --ignore-not-found=true

      - name: Deploy to AKS
        run: kubectl apply -f deployment.yaml

      - name: Wait and show logs
        run: |
          kubectl wait --for=condition=complete job/hello-world --timeout=60s
          kubectl logs -l job-name=hello-world

